name: "CodeQL"

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 6 * * 1"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ["actions", "rust"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Initialize CodeQL
        uses: github/codeql-action/init@f6d5241140f3a83f2c8dd3ce23f86aaccb9710d2 # v4.33.0
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.language == 'rust' && 'autobuild' || 'none' }}
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@f6d5241140f3a83f2c8dd3ce23f86aaccb9710d2 # v4.33.0
