name: Miri

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # Weekly Monday run

jobs:
  miri:
    name: Miri (undefined behaviour check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@v2
      - name: Run Miri
        # Run only the pure unit tests (no async I/O, no network) under Miri.
        # Exclude integration tests that spawn tokio runtimes as Miri does not
        # fully support them yet.
        run: |
          cargo miri test \
            --lib \
            -- \
            ipc::tests \
            process::detectable
        env:
          MIRIFLAGS: "-Zmiri-disable-isolation"
