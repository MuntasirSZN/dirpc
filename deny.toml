# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[advisories]
# Deny all crates with known security vulnerabilities.
version = 2
yanked = "deny"

[licenses]
version = 2
# Allow permissive and well-known copyleft-compatible licenses.
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "ISC",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Zlib",
  "CC0-1.0",
  "OpenSSL",
]

[bans]
# Deny multiple versions of the same crate unless explicitly allowed.
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
