[package]
name = "dirpc"
version = "0.1.0"
edition = "2024"

[dependencies]
tokio = { version = "1.52", features = ["full"] }
axum = { version = "0.8.9", features = ["macros"] }
tower-http = { version = "0.6.8", features = ["cors"] }
sockudo-ws = { version = "1.7.4", features = ["axum-integration", "permessage-deflate", "simd", "tokio-runtime"] }
bytes = "1"
serde = { version = "1", features = ["derive"] }
# serde_json is used for serialisation and big-endian deserialisation fallback
serde_json = "1"
# simd-json is used for fast deserialisation on little-endian platforms
simd-json = "0.17"
# jiff for panic-free, ergonomic timestamps
jiff = "0.2"
# sysinfo for cross-platform process enumeration
sysinfo = "0.38"
# reqwest for fetching the detectable-apps list at runtime
reqwest = { version = "0.13", default-features = false, features = ["json", "rustls-tls"] }
clap = { version = "4", features = ["derive", "env"] }
# clap-verbosity-flag with tracing integration
clap-verbosity-flag = { version = "3", features = ["tracing"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
dashmap = "6.1.0"
parking_lot = "0.12.5"
anyhow = { version = "1.0.102", features = ["backtrace"] }

[dev-dependencies]
tokio-test = "0.4"
divan = "0.1"

[[bench]]
name = "benchmarks"
harness = false
